<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" 
    rel="stylesheet">
    <link rel="stylesheet" href="./assets/reset.css">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="./assets/main.js" defer></script>
    <title>Proyecto formulario</title>
</head>
<body>
    <div class="layout">
    <main class="layout__main">

        <div class="container">

            <h1 class="titulo">Iniciar Sesion</h1>

            <form  class="formulario">

                <div class="form__control">
                        <label class="form__label blur" for="username">Nombre de Usuario</label>
                        <input class="form__input" type="text" id="username"/>
                    </div>

                    <div class="form__control">
                        <label class="form__label blur" for="password">Contraseña</label>
                        <input class="form__input" type="password" id="password"/>
                    </div>

                    <input type="submit" class="form__btn" value="Entrar" />
                </form>
            </div>
        </main>
        </div>
</body>
</html>
